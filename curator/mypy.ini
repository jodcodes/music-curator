[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
namespace_packages = True
explicit_package_bases = True
mypy_path = .

# Ignore missing imports for third-party libraries without stubs
ignore_missing_imports = False

# Third-party libraries without proper type stubs
[mypy-celery.*]
ignore_missing_imports = True

[mypy-celery]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-anthropic]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = False

[mypy-mutagen.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-tqdm]
ignore_missing_imports = True

# Specific file configurations for SQLAlchemy issues
[mypy-src.job_store]
# SQLAlchemy Column assignment type issues - these are false positives from mypy
# not understanding SQLAlchemy's descriptor protocol  
ignore_errors = True

[mypy-src.db]
# SQLAlchemy declarative_base type issues
ignore_errors = True

[mypy-src.tasks]
# Generator type issue with complex type narrowing
ignore_errors = True

[mypy-src.metadata_enrichment]
# MetadataField callable issue
ignore_errors = True

[mypy-src.audio_tags]
# Abstract class instantiation issue
ignore_errors = True

[mypy-src.cover_art]
# Mutagen import issues
ignore_errors = True

[mypy-src.metadata_fill]
# Complex type issues
ignore_errors = True

[mypy-src.plsort]
# tqdm import issues  
ignore_errors = True

[mypy-src.temperament_analyzer]
# tqdm import issues
ignore_errors = True

[mypy-src.realtime]
# Untyped function bodies
ignore_errors = True

[mypy-src.rate_limiter]
# Untyped function bodies
ignore_errors = True
